name: swipix
description: "Modern photo gallery cleaner with Tinder-style swipe interface."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Фиксируем стабильные версии
  photo_manager: 3.0.0
  permission_handler: ^11.3.1
  path_provider: ^2.1.2
  device_info_plus: ^10.1.0
  flutter_riverpod: 2.5.1
  
  fl_chart: ^0.66.2
  google_fonts: ^6.2.1
  path: ^1.9.0
  intl: ^0.19.0
  shared_preferences: ^2.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.0

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/icon/app_icon.png"

flutter_native_splash:
  color: "#0D0221"
  # ПОЛНОЕ УДАЛЕНИЕ КАРТИНКИ ИЗ СПЛЭША
  # Мы не оставляем даже пустую ссылку, чтобы пакет не пытался ничего вставить.
  
  android_12:
    color: "#0D0221"
    # Для Android 12+ принудительно ставим прозрачную заглушку, 
    # если система все равно пытается всунуть иконку.
    
  fullscreen: true

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
