name: swipix
description: "Modern photo gallery cleaner with Tinder-style swipe interface."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Фиксируем стабильные версии
  photo_manager: 3.0.0
  permission_handler: ^11.3.1
  path_provider: ^2.1.2
  device_info_plus: ^10.1.0
  flutter_riverpod: 2.5.1
  
  fl_chart: ^0.66.2
  google_fonts: ^6.2.1
  path: ^1.9.0
  intl: ^0.19.0
  shared_preferences: ^2.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
